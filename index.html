    .resource-row { display: flex; justify-content: space-between; margin: 2px 0; padding: 3px 6px; background: rgba(0,0,0,0.3); border-radius: 3px; font-size: 11px; }
    button { background: linear-gradient(180deg, #2a1f10 0%, #1a1008 100%); border: 1px solid #5a4a30; color: #c0a870; font-family: inherit; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 10px; margin: 2px; }
    button:hover { background: #3a2f15; border-color: #9b8a60; color: #ffd700; }
    .btn-small { padding: 4px 8px; font-size: 9px; }
    .btn-auto { background: linear-gradient(180deg, #1a2a10, #0f1a08); border-color: #4a5a30; }
    .btn-auto.active { background: #1a3010; border-color: #60aa40; }
    .log-box { background: rgba(0,0,0,0.4); border: 1px solid #3a3020; border-radius: 5px; padding: 6px; font-size: 10px; color: #a09070; flex: 1; overflow-y: auto; }
    .progress-bar { background: #0a0a0a; border-radius: 3px; height: 10px; margin: 3px 0; overflow: hidden; }
    .progress-fill { height: 100%; }
    .progress-fill.normal { background: linear-gradient(90deg, #cc3300, #dd6600); }
    .progress-fill.failed { background: linear-gradient(90deg, #660000, #990000); }
    .progress-fill.auto { background: linear-gradient(90deg, #004400, #006600); }
    .progress-fill.complete { background: linear-gradient(90deg, #008800, #00aa00); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: #1a1510; border: 2px solid #8a7040; border-radius: 8px; padding: 14px; max-width: 500px; width: 95%; max-height: 75vh; overflow-y: auto; }
    .modal-option { background: rgba(30,20,10,0.8); border: 1px solid #4a3a20; border-radius: 4px; padding: 7px; margin: 3px 0; cursor: pointer; font-size: 11px; }
    .modal-option:hover { background: rgba(50,35,15,0.9); }
    .close-btn { background: #3a1515; border-color: #5a2020; float: right; padding: 4px 10px; }
    .bottom-bar { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding: 6px 0; flex-shrink: 0; }
    .guild-name-input { background: #0a0805; border: 2px solid #8a7040; color: #ffd700; padding: 8px; font-size: 16px; text-align: center; font-family: monospace; border-radius: 6px; width: 100%; margin: 8px 0; }

    .auto-badge { display: inline-block; background: #003300; color: #44ff44; padding: 1px 6px; border-radius: 8px; font-size: 9px; margin-left: 4px; }

<body>
<div class="guild-container">
  <div class="header" id="guildHeader" title="Double-click to rename"><h1 id="guildTitle">⚔️ GUILD OF THE FALLEN STAR ⚔️</h1></div>
  <div class="main-content">
    <div class="left-panel">
      <pre id="guildDisplay" class="guild-view">Loading...</pre>
      <pre id="combatArena" class="combat-arena idle">⚔️ COMBAT ARENA ⚔️
No battles...</pre>
    </div>
    <div class="right-panel">
      <div class="info-box"><h3>🏰 GUILD</h3><div class="resource-row"><span>🪙 Gold</span><span id="goldAmount">50</span></div><div class="resource-row"><span>⭐ Rep</span><span id="repAmount">0</span></div><div class="resource-row"><span>📊 Lv</span><span id="guildLevel">1</span></div></div>
      <div class="info-box"><h3>🎒 PARTIES</h3><div id="partyList" style="max-height:140px;overflow-y:auto;"></div><button id="createPartyBtn">➕ Party (100g)</button><button id="autoAllBtn" class="btn-auto">🤖 Auto All</button></div>
      <div class="info-box"><h3>🧑 RECRUIT</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;"><button class="btn-small" data-recruit="warrior">⚔️ War 150g</button><button class="btn-small" data-recruit="mage">🔮 Mage 180g</button><button class="btn-small" data-recruit="rogue">🗡️ Rog 160g</button><button class="btn-small" data-recruit="cleric">✝️ Cler 130g</button><button class="btn-small" data-recruit="archer">🏹 Arch 155g</button><button class="btn-small" data-recruit="random">🎲 Rand 100g</button></div></div>
      <div class="info-box" style="flex:1;min-height:0;display:flex;flex-direction:column;"><h3>🛒 SHOP</h3><div id="shopList" style="flex:1;overflow-y:auto;"></div></div>

</div>

<div class="modal" id="selectionModal"><div class="modal-content"><button class="close-btn" id="closeModalBtn">✕</button><h3 id="modalTitle"></h3><div id="modalOptions"></div></div></div>
<div class="modal" id="dataModal"><div class="modal-content"><button class="close-btn" id="closeDataBtn">✕</button><h3 id="dataModalTitle"></h3><textarea id="dataTextarea" style="width:100%;min-height:80px;background:#0a0805;color:#c0a060;border:1px solid #5a4a30;border-radius:4px;padding:6px;font-size:10px;"></textarea><button id="dataActionBtn">📋 Copy</button><button id="dataImportBtn" style="display:none;">✅ Import</button></div></div>
<div class="modal" id="guildNameModal"><div class="modal-content" style="text-align:center;"><h2 style="color:#ffd700;">🏰 Name Your Guild</h2><input type="text" class="guild-name-input" id="guildNameInput" placeholder="FALLEN STAR" maxlength="25" value="FALLEN STAR"><button id="confirmGuildName">⚔️ Found Guild ⚔️</button></div></div>

<script>
(function() {
  const ES = { 'Goblin':['   👺','  (⚔️)','  /│\\','   │','  / \\'], 'Skeleton':['   💀','  (🦴)','  /│\\','   │','  / \\'], 'Dragon':['   🐉','  (🔥)',' /🐉\\','  ││','  ╚╝'], 'Bandit':['   🥷','  (🗡️)','  /│\\','   │','  / \\'], 'Golem':['   🗿','  (💎)','  /│\\','  ║║','  ═╝'], 'Demon Lord':['   👹','  (👑)',' /🔥\\','  ║║','  ╚╝'], 'Dark Knight':['   🦹','  (⚔️)','  /▓\\','   ║','  / \\'], 'Lich':['   🧙','  (💀)',' /☠️\\','  ║','  / \\'] };
  const HS = { warrior:['  ⚔️ ',' (🛡️)','  /│\\','   │ ','  / \\'], mage:['  🔮 ',' (✨)','  /│\\','   │ ','  / \\'], rogue:['  🗡️ ',' (💨)','  /│\\','   │ ','  / \\'], cleric:['  ✝️ ',' (💉)','  /│\\','   │ ','  / \\'], archer:['  🏹 ',' (🎯)','  /│\\','   │ ','  / \\'] };
  const CL = { warrior:{n:'Warrior',ba:8,bd:5,e:'⚔️',sk:'cleave',sn:'Cleave',dt:'dmg'}, mage:{n:'Mage',ba:12,bd:2,e:'🔮',sk:'fireball',sn:'Fireball',dt:'dmg'}, rogue:{n:'Rogue',ba:10,bd:3,e:'🗡️',sk:'backstab',sn:'Backstab',dt:'dmg'}, cleric:{n:'Cleric',ba:5,bd:7,e:'✝️',sk:'heal',sn:'Heal',dt:'heal'}, archer:{n:'Archer',ba:9,bd:4,e:'🏹',sk:'lifesteal',sn:'Vamp Shot',dt:'dmg'} };
  const NAMES = ['Aldric','Thorne','Bram','Cedric','Dorian','Elara','Fenris','Gareth','Hawke','Iris','Jorah','Kael','Lysa','Maren','Nyx','Orin'];

  // FIXED: Boss HP reduced so power 21 CAN beat requirement 10 boss
  const QUESTS = [
    { n:'Goblin Hunt', d:2, r:15, dur:4, i:'👺', e:'Goblin', rep:0, hp:20, cd:0 },
    { n:'Escort', d:1, r:8, dur:3, i:'🛡️', e:'Bandit', rep:0, hp:12, cd:0 },
    { n:'Dungeon', d:5, r:40, dur:8, i:'🕳️', e:'Skeleton', rep:80, hp:60, cd:0 },
    { n:'Treasure', d:4, r:30, dur:6, i:'💎', e:'Golem', rep:60, hp:45, cd:0 },
    { n:'Dragon', d:10, r:150, dur:15, i:'🐉', e:'Dragon', rep:200, hp:200, cd:300 },
    { n:'Dark Knight', d:8, r:100, dur:12, i:'🦹', e:'Dark Knight', rep:150, hp:140, cd:180 },
    { n:'Lich Tower', d:9, r:120, dur:14, i:'🧙', e:'Lich', rep:180, hp:170, cd:240 },
    { n:'Demon Lord', d:15, r:350, dur:20, i:'👹', e:'Demon Lord', rep:350, hp:350, cd:600 },
  ];
  
  const EQ = { ws:{ n:'Wood Sword', ab:3, db:0, c:50, i:'🗡️' }, ia:{ n:'Iron Armor', ab:0, db:3, c:60, i:'🛡️' }, ms:{ n:'Magic Staff', ab:6, db:0, c:120, i:'🔮' }, sp:{ n:'Steel Plate', ab:0, db:5, c:100, i:'⚔️' }, lb:{ n:'Legend Blade', ab:12, db:3, c:300, i:'⭐' }, sb:{ n:'Swift Boots', ab:2, db:3, c:80, i:'👢' }, pr:{ n:'Power Ring', ab:5, db:1, c:150, i:'💍' } };
  const MAX_EQ = 3, CD = 30;
  let mc = null, ae = false, gn = 'FALLEN STAR', lastVisible = Date.now(), isTabVisible = true;

  let S = { g:50, rep:0, gl:1, adv:[], pt:[], lt:Date.now(), lm:[], ac:{}, un:new Set(), dc:{}, aq:{}, qCd:{} };

  // FIXED: Power = ATK + DEF (simple and accurate)
  function getPartyPower(p) { 
    return p.m.reduce((s,id)=>{const a=S.adv.find(x=>x.id===id);return s+(a?a.atk+a.def:0);},0); 
  }
  // FIXED: Requirement = difficulty * 3 (more achievable)
  function getQuestReq(q) { return q.d * 3; }

  document.addEventListener('visibilitychange', () => { const wh = !isTabVisible; isTabVisible = !document.hidden; if (isTabVisible && wh) { const now = Date.now(); const hd = Math.floor((now - lastVisible) / 1000); if (hd > 2) { const cy = Math.min(Math.floor(hd * 2), 100000); const wa = ae; ae = true; for (let i = 0; i < cy; i++) gloopInternal(); ae = wa; document.getElementById('afkBadge').style.display = 'none'; al(`⏳ AFK ${fmtTime(hd)}`); } lastVisible = Date.now(); } else if (!isTabVisible) { lastVisible = Date.now(); document.getElementById('afkBadge').style.display = 'inline-block'; } });

  function aq() { const now = Date.now(); return QUESTS.filter(q => { if (S.rep < q.rep) return false; if (q.cd > 0 && S.qCd[q.n] && now < S.qCd[q.n]) return false; return true; }); }
  function bq(p) { const pw = getPartyPower(p); const av = aq(); let best = null; for(let q of av) { if(pw >= getQuestReq(q) && (!best || q.d > best.d)) best = q; } return best; }
  function rn() { const av = NAMES.filter(n => !S.un.has(n)); if(!av.length) return NAMES[Math.floor(Math.random()*NAMES.length)] + ' II'; const nm = av[Math.floor(Math.random()*av.length)]; S.un.add(nm); return nm; }
  function al(m) { S.lm.unshift(`🕒 ${new Date().toLocaleTimeString().slice(0,5)} ${m}`); if(S.lm.length>10)S.lm.pop(); document.getElementById('logContent').innerHTML = S.lm.join('<br>'); }
  function gcd(id){const c=S.dc[id];return c?Math.max(0,Math.ceil((c-Date.now())/1000)):0;}
  function icd(id){return gcd(id)>0;}
  function scd(id){S.dc[id]=Date.now()+(CD*1000);}
  function fmtTime(sec){if(sec<=0)return'0s';const m=Math.floor(sec/60);const s=sec%60;return m>0?`${m}m ${s}s`:`${s}s`;}
  function getQcd(qn){if(!S.qCd[qn])return 0;return Math.max(0,Math.ceil((S.qCd[qn]-Date.now())/1000));}

  function sm(t,o,cb){const m=document.getElementById('selectionModal');document.getElementById('modalTitle').textContent=t;const op=document.getElementById('modalOptions');op.innerHTML='';mc=cb;o.forEach(opt=>{const d=document.createElement('div');d.className='modal-option';if(opt.lk)d.classList.add('locked-quest');d.textContent=opt.lb;d.addEventListener('click',function(e){e.stopPropagation();if(!opt.lk){m.classList.remove('active');if(mc){const c=mc;mc=null;c(opt.v);}}});op.appendChild(d);});m.classList.add('active');}
  function fp(id){return S.pt.find(p=>p.m.includes(id))||null;}

  function ic(pid,q){const p=S.pt.find(x=>x.id===pid);if(!p)return;const mb=p.m.map(id=>S.adv.find(a=>a.id===id)).filter(a=>a&&a.hp>0);S.ac[pid]={en:q.e,ehp:q.hp,meh:q.hp,mb:mb.map(m=>({...m,chp:m.hp,bt:0})),ms:[],pw:false,ed:false,td:0,th:0};}
  
  // FIXED: More damage dealt, less enemy damage
  function us(adv,cm){const cd=CL[adv.class];let dmg=0,heal=0,msg='';if(cd.dt==='heal'){heal=Math.floor(adv.atk*2.5*(0.9+Math.random()*0.3));cm.mb.forEach(m=>{m.chp=Math.min(m.maxHp,m.chp+heal);});cm.th+=heal;msg=`✝️ ${adv.name} HEALS! +${heal}`;}else{switch(cd.sk){case'cleave':dmg=Math.floor(adv.atk*2.0*(0.8+Math.random()*0.4));msg=`⚔️ ${adv.name} CLEAVES! -${dmg}`;break;case'fireball':dmg=Math.floor(adv.atk*1.8*(0.8+Math.random()*0.4));cm.mb.forEach(m=>{if(m.id===adv.id)m.bt=3;});msg=`🔥 ${adv.name} FIREBALL! -${dmg}+BURN`;break;case'backstab':dmg=Math.floor(adv.atk*2.5*(0.9+Math.random()*0.3));msg=`🗡️ ${adv.name} BACKSTAB! -${dmg}`;break;case'lifesteal':dmg=Math.floor(adv.atk*1.8*(0.8+Math.random()*0.4));const sh=Math.floor(dmg*0.5);cm.mb.forEach(m=>{if(m.id===adv.id)m.chp=Math.min(m.maxHp,m.chp+sh);});cm.th+=sh;msg=`💜 ${adv.name} VAMP! -${dmg}+${sh}HP`;break;default:dmg=Math.floor(adv.atk*1.2*(0.8+Math.random()*0.4));msg=`${cd.e} ${adv.name} attacks! -${dmg}`;}dmg=Math.max(5,dmg);cm.ehp-=dmg;cm.td+=dmg;}return{msg,dmg,heal};}
  
  function tc(pid){const c=S.ac[pid];if(!c||c.pw||c.ed)return;c.ms=[];c.mb.forEach(m=>{if(m.bt>0&&m.chp>0){m.chp-=8;m.bt--;c.ms.push(`🔥 ${m.name} -8 burn`);}});c.mb.forEach(m=>{if(m.chp<=0)return;c.ms.push(us(m,c).msg);});if(c.ehp<=0){c.ed=true;c.ms.push(`✨ ${c.en} defeated!`);c.mb.forEach(m=>{const a=S.adv.find(x=>x.id===m.id);if(a)a.hp=Math.min(a.maxHp,m.chp+25);});return;}const alv=c.mb.filter(m=>m.chp>0);if(alv.length>0){const t=alv[Math.floor(Math.random()*alv.length)];const q=QUESTS.find(x=>x.e===c.en);const edmg=Math.floor((q?.d||2)*4*(0.8+Math.random()*0.4));t.chp-=edmg;c.ms.push(`👹 ${c.en} -${edmg} → ${t.name}`);if(t.chp<=0){c.ms.push(`💀 ${t.name} down!`);t.chp=0;}}if(c.mb.every(m=>m.chp<=0)){c.pw=true;c.ms.push('💀 WIPED!');c.mb.forEach(m=>{scd(m.id);const a=S.adv.find(x=>x.id===m.id);if(a)a.hp=0;});}}

  function rc(){const ar=document.getElementById('combatArena');const ac=S.pt.filter(p=>p.q&&S.ac[p.id]);if(!ac.length){ar.className='combat-arena idle';ar.textContent=`⚔️ COMBAT ARENA ⚔️\nNo battles... ${ae?'🤖 Auto active!':''}`;return;}ar.className='combat-arena';let sc=[];ac.forEach(p=>{const c=S.ac[p.id];if(!c)return;const pct=Math.floor((p.pr/p.td)*100);const rs=Math.max(0,Math.ceil((p.td-p.pr)*0.5));const tleft=fmtTime(rs);const pw=getPartyPower(p);let s=[];if(c.pw)s.push(`💀 ${p.n} VS ${c.en} [WIPED]`);else if(c.ed)s.push(`⚔️ ${p.n} VS ${c.en} [DONE! ${pct}%]`);else s.push(`⚔️ ${p.n} VS ${c.en} [${pct}% · ${tleft}] ⚡${pw}`);s.push('━━━━━━━━━━━━━━━━━━━━━━━━━━━━');if(c.ed||c.pw)s.push(`👹 ${c.en}: ${c.ed?'💀 DEFEATED':'👑 SURVIVED'}`);else{const hp=Math.max(0,c.ehp/c.meh);const br='█'.repeat(Math.floor(hp*20))+'░'.repeat(20-Math.floor(hp*20));s.push(`👹 ${c.en}: [${br}] ${Math.floor(c.ehp)}/${c.meh}`);}s.push(`Dmg:${c.td} Heal:${c.th}`);s.push('');const esp=ES[c.en]||ES['Goblin'];const hsp=c.mb.map(m=>HS[m.class]||HS['warrior']);for(let i=0;i<5;i++){let l='   ';l+=(esp[i]||'     ').padEnd(16);hsp.forEach(sp=>l+=(sp[i]||'     ')+' ');s.push(l);}s.push('');c.mb.forEach(m=>{const hp=Math.max(0,m.chp/m.maxHp);const br='█'.repeat(Math.floor(hp*10))+'░'.repeat(10-Math.floor(hp*10));s.push(` ${CL[m.class].e} ${m.name}: [${br}] ${m.chp<=0?'💀':'❤️'}${m.bt>0?' 🔥':''}`);});if(c.ms.length>0){s.push('');c.ms.slice(-4).forEach(m=>s.push(`  ${m}`));}sc.push(s.join('\n'));});ar.textContent=sc.join('\n\n');}

  function cp(nm){if(S.g<100){al('❌ Need 100g!');return;}S.g-=100;const id=Date.now();S.pt.push({id,n:nm||`P${S.pt.length+1}`,m:[],q:null,pr:0,td:0});S.aq[id]=false;al(`🎉 ${nm||'Party'} created!`);ui();}
  function asp(pid,aid){const p=S.pt.find(x=>x.id===pid);const a=S.adv.find(x=>x.id===aid);if(!p||!a)return;if(icd(aid)){al(`⚠️ ${a.name} recovering`);return;}if(p.m.length>=4){al('⚠️ Full!');return;}if(a.hp<=0){al('⚠️ Unconscious!');return;}S.pt.forEach(x=>x.m=x.m.filter(i=>i!==aid));p.m.push(aid);al(`${CL[a.class].e} ${a.name} → ${p.n}`);ui();}
  function usp(pid,aid){const p=S.pt.find(x=>x.id===pid);if(!p)return;p.m=p.m.filter(i=>i!==aid);const a=S.adv.find(x=>x.id===aid);if(a)al(`🔙 ${CL[a.class].e} ${a.name} unassigned`);ui();}
  function sq(pid,qi){const p=S.pt.find(x=>x.id===pid);if(!p)return;if(p.q){al('⚠️ On quest!');return;}if(!p.m.length){al('⚠️ Empty!');return;}if(p.m.some(i=>icd(i))){al('⚠️ Members recovering');return;}const av=aq();const q=av[qi];if(!q)return;const qcd=getQcd(q.n);if(qcd>0){al(`⚠️ ${q.n} on cooldown: ${fmtTime(qcd)}`);return;}const pw=getPartyPower(p);const req=getQuestReq(q);if(pw<req){al(`⚠️ Weak ⚡${pw}/${req}`);return;}p.q=q;p.pr=0;p.td=q.dur;ic(pid,q);al(`⚔️ ${p.n} → ${q.i} ${q.n} ⚡${pw}`);ui();}
  function aaq(p){if(!p||p.q||!p.m.length)return false;if(p.m.some(i=>icd(i)))return false;const b=bq(p);if(!b)return false;const qi=aq().indexOf(b);if(qi>=0){p.q=b;p.pr=0;p.td=b.dur;ic(p.id,b);return true;}return false;}
  function taq(pid){const p=S.pt.find(x=>x.id===pid);if(!p)return;S.aq[pid]=!S.aq[pid];if(S.aq[pid]){al(`🤖 Auto ON: ${p.n}`);if(!p.q)aaq(p);}else al(`🔕 Auto OFF: ${p.n}`);ae=Object.values(S.aq).some(v=>v===true);ui();}
  function taa(){ae=!ae;if(ae){S.pt.forEach(p=>{S.aq[p.id]=true;if(!p.q)aaq(p);});al('🤖 AUTO ALL ON');}else{S.pt.forEach(p=>S.aq[p.id]=false);al('🔕 Auto off');}ui();}
  function be(aid,ek){const a=S.adv.find(x=>x.id===aid);const e=EQ[ek];if(!a||!e)return;if(S.g<e.c){al(`❌ ${e.c}g`);return;}if(a.eq.includes(ek)){al('⚠️ Equipped');return;}if(a.eq.length>=MAX_EQ){al('⚠️ Full');return;}S.g-=e.c;a.eq.push(ek);a.atk+=e.ab||0;a.def+=e.db||0;al(`🛒 ${a.name}: ${e.i} ⚡${a.atk+a.def}`);ui();}
  function re(aid,ek){const a=S.adv.find(x=>x.id===aid);const e=EQ[ek];if(!a||!e)return;if(!a.eq.includes(ek)){al('⚠️ Not equipped');return;}a.eq=a.eq.filter(x=>x!==ek);a.atk-=e.ab||0;a.def-=e.db||0;al(`🗑️ ${a.name}: ${e.n}`);ui();}
  function ug(){const c=S.gl*500;if(S.g<c){al(`❌ ${c}g`);return;}S.g-=c;S.gl++;S.rep+=100;al(`🏰 Lv${S.gl}!`);ui();}
  function rcl(cn){const cs={warrior:150,mage:180,rogue:160,cleric:130,archer:155,random:100};const c=cs[cn]||100;if(S.g<c){al(`❌ ${c}g`);return;}let rc=cn;if(cn==='random'){const ks=Object.keys(CL);rc=ks[Math.floor(Math.random()*ks.length)];}const cd=CL[rc];const nm=rn();S.g-=c;S.adv.push({id:Date.now(),name:nm,class:rc,level:1,exp:0,eq:[],atk:cd.ba,def:cd.bd,hp:100,maxHp:100});al(`🧑 ${cd.e} ${nm} ⚡${cd.ba+cd.bd}`);ui();}
  function sae(aid){const a=S.adv.find(x=>x.id===aid);if(!a)return;if(!a.eq.length){al(`ℹ️ ${a.name} has no equipment.`);return;}const op=a.eq.map(ek=>{const e=EQ[ek];return{lb:`🗑️ Remove ${e.i} ${e.n}`,v:{aid:a.id,ek}};});sm(`${CL[a.class].e} ${a.name}'s Equipment`,op,(d)=>re(d.aid,d.ek));}

  function rq(p){const c=S.ac[p.id];if(!p.q)return;const qn=p.q.n;if(c&&c.pw){al(`💀 ${p.n} WIPED on ${p.q.n}!`);p.q=null;p.pr=0;delete S.ac[p.id];return;}if(p.pr>=p.td){if(c&&c.ed){const rw=p.q.r*(1+(S.gl-1)*0.1);S.g+=Math.floor(rw);S.rep+=p.q.d*5;p.m.forEach(id=>{const a=S.adv.find(x=>x.id===id);if(a&&a.hp>0){a.exp+=p.q.d*15;if(a.exp>=a.level*80){a.level++;a.exp=0;a.atk+=4;a.def+=3;a.maxHp+=30;a.hp=a.maxHp;if(!ae)al(`⭐ ${a.name} → Lv${a.level}!`);}}});if(!ae)al(`✅ ${p.n} killed ${p.q.n}! +${Math.floor(rw)}g`);if(p.q.cd>0){S.qCd[qn]=Date.now()+(p.q.cd*1000);al(`⏳ ${qn} cooldown: ${fmtTime(p.q.cd)}`);}}else{al(`⏰ ${p.n} FAILED ${p.q.n}!`);}p.q=null;p.pr=0;delete S.ac[p.id];}}

  function gloopInternal(){Object.entries(S.dc).forEach(([id,et])=>{if(Date.now()>=et){const a=S.adv.find(x=>x.id===parseInt(id));if(a&&a.hp<=0){a.hp=a.maxHp;delete S.dc[id];}}});S.pt.forEach(p=>{if(S.aq[p.id]&&!p.q)aaq(p);});S.pt.forEach(p=>{if(!p.q)return;const c=S.ac[p.id];if(c&&c.pw){rq(p);return;}p.pr+=1;if(c&&!c.ed&&!c.pw){tc(p.id);if(c.pw){rq(p);return;}}if(p.pr>=p.td)rq(p);});}
  function gloop(){gloopInternal();if(isTabVisible)ui();else S.lt=Date.now();}

  function getSortedAdv(){return [...S.adv].sort((a,b)=>a.name.localeCompare(b.name));}
  function getSortedPt(){return [...S.pt].sort((a,b)=>a.n.localeCompare(b.n));}

  function ui(){
    document.getElementById('goldAmount').textContent=Math.floor(S.g);
    document.getElementById('repAmount').textContent=Math.floor(S.rep);
    document.getElementById('guildLevel').textContent=S.gl;
    const ab=document.getElementById('autoAllBtn');
    if(ae){ab.textContent='🤖 Auto ON';ab.classList.add('active');}else{ab.textContent='🤖 Auto All';ab.classList.remove('active');}
    if(!isTabVisible)document.getElementById('afkBadge').style.display='inline-block';
    
    let v=['╔══════════════════════════════════╗',`║ 🏰 Lv${S.gl} | Rep:${String(S.rep).padStart(4)} | Gold:${String(Math.floor(S.g)).padStart(5)} ║`,'╚══════════════════════════════════╝','','👥 ADVENTURERS (click [Gear]):','──────────────────────────────────────────'];
    getSortedAdv().forEach(a=>{const cd=CL[a.class];const p=fp(a.id);const hp=Math.floor(a.hp/a.maxHp*10);const hb='█'.repeat(hp)+'░'.repeat(10-hp);const eq=a.eq.map(e=>EQ[e]?.i||'').join(' ')||'(none)';const cd2=gcd(a.id);const gb=a.eq.length>0?' [⚙️Gear]':'';const ap=a.atk+a.def;v.push(`${cd.e} ${a.name.padEnd(10)} Lv${String(a.level).padStart(2)} [${hb}] ⚡${String(ap).padStart(3)} ${eq}${cd2>0?' ⏳'+cd2+'s':''}${p?' 🎒':''}${gb}`);});
    document.getElementById('guildDisplay').textContent=v.join('\n');
    
    document.getElementById('guildDisplay').onclick=function(e){const t=document.getElementById('guildDisplay').textContent;const ls=t.split('\n');const lh=18;const r=document.getElementById('guildDisplay').getBoundingClientRect();const ry=e.clientY-r.top+document.getElementById('guildDisplay').scrollTop;const li=Math.floor(ry/lh);if(li>=0&&li<ls.length){const l=ls[li];if(l.includes('[⚙️Gear]')){for(const a of S.adv){if(l.includes(a.name)&&a.eq.length>0){sae(a.id);break;}}}}};
    
    const pl=document.getElementById('partyList');
    pl.innerHTML=getSortedPt().map(p=>{const mb=p.m.map(id=>{const a=S.adv.find(x=>x.id===id);return a?`${CL[a.class].e}${a.name}`:'';}).join(',')||'Empty';const c=S.ac[p.id];const fl=c?.pw;const ia=S.aq[p.id];const pct=p.q?Math.min(100,Math.floor((p.pr/p.td)*100)):0;const pw=getPartyPower(p);const req=p.q?getQuestReq(p.q):0;let qs='🛌';let pfClass='normal';if(p.q){if(c?.pw){qs=`<span style="color:#f44">💀 WIPED</span>`;pfClass='failed';}else if(c?.ed){qs=`<span style="color:#4f4">${p.q.i} ${p.q.n} DONE! (${pct}%)</span>`;pfClass='complete';}else{qs=`<span style="color:#fa0">${p.q.i} ${p.q.n} ${pct}%</span>`;pfClass=ia?'auto':'normal';}}return`<div style="background:#151528;border:1px solid #4a3a20;border-radius:6px;padding:6px;margin:4px 0;"><strong>${p.n}</strong> (${p.m.length}/4) ⚡${pw}${ia?'<span class="auto-badge">AUTO</span>':''}<br><small>${mb}</small><br>${p.q?`<div class="progress-bar"><div class="progress-fill ${pfClass}" style="width:${pct}%"></div></div>${qs}`:'🛌 Idle'}<br><button class="btn-small" data-a="as" data-p="${p.id}">👤</button><button class="btn-small" data-a="us" data-p="${p.id}">🔙</button><button class="btn-small" data-a="sq" data-p="${p.id}">📜</button><button class="btn-small ${ia?'btn-auto active':'btn-auto'}" data-a="ta" data-p="${p.id}">🤖</button></div>`;}).join('');
    
    pl.querySelectorAll('[data-a="as"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const pid=parseInt(this.dataset.p);const tp=S.pt.find(p=>p.id===pid);const av=S.adv.filter(a=>a.hp>0&&!icd(a.id));if(!av.length){al('❌ No available');return;}sm(`Assign to ${tp?.n}`,av.map(a=>{const cp=fp(a.id);let lb=`${CL[a.class].e} ${a.name} Lv${a.level} ⚡${a.atk+a.def}`;let ic=false,io=false;if(cp){if(cp.id===pid){lb+=' ✅';ic=true;}else{lb+=` ⚠️${cp.n}`;io=true;}}return{lb,v:a.id,inCurrentParty:ic,inOtherParty:io};}),(aid)=>asp(pid,aid));});});
    pl.querySelectorAll('[data-a="us"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const pid=parseInt(this.dataset.p);const p=S.pt.find(x=>x.id===pid);if(!p||!p.m.length){al('⚠️ Empty');return;}sm(`Unassign from ${p.n}`,p.m.map(id=>{const a=S.adv.find(x=>x.id===id);return{lb:`${a?CL[a.class].e+' '+a.name:'?'}`,v:id};}),(aid)=>usp(pid,aid));});});
    pl.querySelectorAll('[data-a="sq"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const pid=parseInt(this.dataset.p);const p=S.pt.find(x=>x.id===pid);if(!p)return;if(p.q){al('⚠️ On quest');return;}if(!p.m.length){al('⚠️ Empty');return;}const av=aq();const pw=getPartyPower(p);if(!av.length){al('❌ No quests');return;}sm(`Quest (Party ⚡${pw})`,QUESTS.map((q,i)=>{const qcd=getQcd(q.n);const cdText=qcd>0?` ⏳${fmtTime(qcd)}`:'';const avail=av.some(x=>x.n===q.n);const req=getQuestReq(q);return{lb:`${q.i} ${q.n} D:${q.d} ${q.r}g ${q.dur}s HP:${q.hp} Req⚡${req}${cdText}${!avail&&S.rep>=q.rep?' CD':''}${S.rep<q.rep?' 🔒'+q.rep:''}`,v:av.indexOf(q),lk:!avail||S.rep<q.rep};}),(qi)=>sq(pid,qi));});});
    pl.querySelectorAll('[data-a="ta"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();taq(parseInt(this.dataset.p));});});
    
    const sl=document.getElementById('shopList');
    sl.innerHTML=Object.entries(EQ).map(([k,e])=>`<div style="display:flex;justify-content:space-between;background:#1a1a2a;padding:5px;margin:2px 0;border-radius:4px;font-size:10px;"><span>${e.i} ${e.n} +${e.ab}A +${e.db}D ${e.c}g</span><button class="btn-small" data-a="by" data-ek="${k}">Buy</button></div>`).join('');
    sl.querySelectorAll('[data-a="by"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const ek=this.dataset.ek;const av=S.adv.filter(a=>a.hp>0&&a.eq.length<MAX_EQ);if(!av.length){al('❌ No slots');return;}sm(`Buy ${EQ[ek].n}`,av.map(a=>({lb:`${CL[a.class].e} ${a.name} (${a.eq.length}/${MAX_EQ})`,v:a.id})),(aid)=>be(aid,ek));});});
    rc();
  }

  function sv(){S.lt=Date.now();const ss={g:S.g,rep:S.rep,gl:S.gl,adv:S.adv,pt:S.pt.map(p=>({...p,q:null,pr:0})),lt:Date.now(),un:Array.from(S.un),dc:S.dc,aq:S.aq,gn:gn,qCd:S.qCd};try{localStorage.setItem('isekaiGV33',btoa(JSON.stringify(ss)));al('💾 Saved!');}catch(e){}}
  function ex(){const ss={g:S.g,rep:S.rep,gl:S.gl,adv:S.adv,pt:S.pt.map(p=>({...p,q:null,pr:0})),lt:Date.now(),un:Array.from(S.un),dc:S.dc,aq:S.aq,gn:gn,qCd:S.qCd};const d=btoa(JSON.stringify(ss));const m=document.getElementById('dataModal');document.getElementById('dataModalTitle').textContent='📤 Export';document.getElementById('dataTextarea').value=d;document.getElementById('dataActionBtn').style.display='inline-block';document.getElementById('dataImportBtn').style.display='none';m.classList.add('active');document.getElementById('dataActionBtn').onclick=function(){const t=document.getElementById('dataTextarea').value;navigator.clipboard?.writeText?navigator.clipboard.writeText(t).then(()=>al('📤 Copied!')):al('📤 Copied!');};}
  function im(){const m=document.getElementById('dataModal');document.getElementById('dataModalTitle').textContent='📥 Import';document.getElementById('dataTextarea').value='';document.getElementById('dataActionBtn').style.display='none';document.getElementById('dataImportBtn').style.display='inline-block';m.classList.add('active');document.getElementById('dataImportBtn').onclick=function(){const d=document.getElementById('dataTextarea').value.trim();if(!d)return;try{const dec=JSON.parse(atob(d));S={...S,g:dec.g||50,rep:dec.rep||0,gl:dec.gl||1,adv:dec.adv||[],pt:dec.pt||[],ac:{},un:new Set(dec.un||[]),dc:dec.dc||{},aq:dec.aq||{},lt:dec.lt||Date.now(),lm:S.lm,qCd:dec.qCd||{}};gn=dec.gn||'FALLEN STAR';document.getElementById('guildTitle').textContent=`⚔️ ${gn} ⚔️`;m.classList.remove('active');al('📥 Imported!');ui();}catch(e){}};}
  function ld(){const sv=localStorage.getItem('isekaiGV33');if(sv){try{const dec=JSON.parse(atob(sv));S={...S,g:dec.g||50,rep:dec.rep||0,gl:dec.gl||1,adv:dec.adv||[],pt:dec.pt||[],ac:{},un:new Set(dec.un||[]),dc:dec.dc||{},aq:dec.aq||{},lt:dec.lt||Date.now(),lm:S.lm,qCd:dec.qCd||{}};gn=dec.gn||'FALLEN STAR';document.getElementById('guildTitle').textContent=`⚔️ ${gn} ⚔️`;return true;}catch(e){}}return false;}
  function op(){const d=Math.floor((Date.now()-S.lt)/1000);if(d>3){const cy=Math.min(Math.floor(d*2),100000);const wa=ae;ae=true;for(let i=0;i<cy;i++)gloopInternal();ae=wa;al(`⏳ Offline ${fmtTime(d)}`);}S.lt=Date.now();}

  function sgn(){document.getElementById('guildNameModal').classList.add('active');document.getElementById('guildNameInput').value=gn;document.getElementById('guildNameInput').focus();}
  function cfg(){const i=document.getElementById('guildNameInput');const n=i.value.trim().toUpperCase()||'FALLEN STAR';gn=n;document.getElementById('guildTitle').textContent=`⚔️ ${gn} ⚔️`;document.getElementById('guildNameModal').classList.remove('active');al(`🏰 Guild "${gn}" renamed!`);sv();}

  document.getElementById('confirmGuildName').addEventListener('click',cfg);
  document.getElementById('guildNameInput').addEventListener('keypress',function(e){if(e.key==='Enter')cfg();});
  document.getElementById('guildHeader').addEventListener('dblclick',function(e){e.preventDefault();sgn();});
  document.getElementById('saveBtn').addEventListener('click',function(e){e.preventDefault();sv();});
  document.getElementById('exportBtn').addEventListener('click',function(e){e.preventDefault();ex();});
  document.getElementById('importBtn').addEventListener('click',function(e){e.preventDefault();im();});
  document.getElementById('upgradeGuildBtn').addEventListener('click',function(e){e.preventDefault();ug();});
  document.getElementById('createPartyBtn').addEventListener('click',function(e){e.preventDefault();cp(prompt('Name:'));});
  document.getElementById('autoAllBtn').addEventListener('click',function(e){e.preventDefault();taa();});
  document.querySelectorAll('[data-recruit]').forEach(b=>{b.addEventListener('click',function(e){e.preventDefault();rcl(this.dataset.recruit);});});
  document.getElementById('closeModalBtn').addEventListener('click',function(){document.getElementById('selectionModal').classList.remove('active');mc=null;});
  document.getElementById('closeDataBtn').addEventListener('click',function(){document.getElementById('dataModal').classList.remove('active');});
  document.getElementById('selectionModal').addEventListener('click',function(e){if(e.target===this){this.classList.remove('active');mc=null;}});
  document.getElementById('dataModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('active');});

  function init(){
    if(!ld()){S.adv=[{id:1,name:'Aldric',class:'warrior',level:1,exp:0,eq:[],atk:8,def:5,hp:100,maxHp:100}];S.un=new Set(['Aldric']);const pid=Date.now();S.pt=[{id:pid,n:'Starting Party',m:[1],q:null,pr:0,td:0}];S.aq[pid]=false;sgn();}
    document.getElementById('guildTitle').textContent=`⚔️ ${gn} ⚔️`;
    op();ui();setInterval(gloop,500);setInterval(sv,15000);
  }
  window.addEventListener('load',init);
})();
</script>
</body>
</html>
