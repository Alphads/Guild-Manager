<script>
(function() {
  const ES = { 'Goblin':['   рЯСЇ','  (вЪФпЄП)','  /вФВ\\','   вФВ','  / \\'], 'Skeleton':['   рЯТА','  (рЯ¶і)','  /вФВ\\','   вФВ','  / \\'], 'Dragon':['   рЯРЙ','  (рЯФ•)',' /рЯРЙ\\','  вФВвФВ','  вХЪвХЭ'], 'Bandit':['   рЯ•Ј','  (рЯЧ°пЄП)','  /вФВ\\','   вФВ','  / \\'], 'Golem':['   рЯЧњ','  (рЯТО)','  /вФВ\\','  вХСвХС','  вХРвХЭ'], 'Demon Lord':['   рЯСє','  (рЯСС)',' /рЯФ•\\','  вХСвХС','  вХЪвХЭ'], 'Dark Knight':['   рЯ¶є','  (вЪФпЄП)','  /вЦУ\\','   вХС','  / \\'], 'Lich':['   рЯІЩ','  (рЯТА)',' /вШ†пЄП\\','  вХС','  / \\'] };
  const HS = { warrior:['  вЪФпЄП ',' (рЯЫ°пЄП)','  /вФВ\\','   вФВ ','  / \\'], mage:['  рЯФЃ ',' (вЬ®)','  /вФВ\\','   вФВ ','  / \\'], rogue:['  рЯЧ°пЄП ',' (рЯТ®)','  /вФВ\\','   вФВ ','  / \\'], cleric:['  вЬЭпЄП ',' (рЯТЙ)','  /вФВ\\','   вФВ ','  / \\'], archer:['  рЯПє ',' (рЯОѓ)','  /вФВ\\','   вФВ ','  / \\'] };
  const CL = { warrior:{n:'Warrior',ba:8,bd:5,e:'вЪФпЄП',sk:'cleave',dt:'dmg'}, mage:{n:'Mage',ba:12,bd:2,e:'рЯФЃ',sk:'fireball',dt:'dmg'}, rogue:{n:'Rogue',ba:10,bd:3,e:'рЯЧ°пЄП',sk:'backstab',dt:'dmg'}, cleric:{n:'Cleric',ba:5,bd:7,e:'вЬЭпЄП',sk:'heal',dt:'heal'}, archer:{n:'Archer',ba:9,bd:4,e:'рЯПє',sk:'lifesteal',dt:'dmg'} };
  const NAMES = ['Aldric','Thorne','Bram','Cedric','Dorian','Elara','Fenris','Gareth','Hawke','Iris','Jorah','Kael','Lysa','Maren','Nyx','Orin'];

  // FIXED: Longer quest durations so there's actual time to fight
  const QUESTS = [
    { n:'Goblin Hunt', d:2, r:15, dur:12, i:'рЯСЇ', e:'Goblin', rep:0, hp:40, cd:0 },
    { n:'Escort', d:1, r:8, dur:10, i:'рЯЫ°пЄП', e:'Bandit', rep:0, hp:25, cd:0 },
    { n:'Dungeon', d:5, r:50, dur:25, i:'рЯХ≥пЄП', e:'Skeleton', rep:150, hp:120, cd:60 },
    { n:'Treasure', d:4, r:35, dur:20, i:'рЯТО', e:'Golem', rep:100, hp:90, cd:30 },
    { n:'Dragon', d:10, r:200, dur:50, i:'рЯРЙ', e:'Dragon', rep:500, hp:400, cd:86400 },
    { n:'Dark Knight', d:8, r:120, dur:40, i:'рЯ¶є', e:'Dark Knight', rep:350, hp:280, cd:43200 },
    { n:'Lich Tower', d:9, r:160, dur:45, i:'рЯІЩ', e:'Lich', rep:400, hp:340, cd:21600 },
    { n:'Demon Lord', d:15, r:500, dur:70, i:'рЯСє', e:'Demon Lord', rep:800, hp:700, cd:3600 },
  ];
  
  const EQ = { ws:{ n:'Wood Sword', ab:3, db:0, c:50, i:'рЯЧ°пЄП' }, ia:{ n:'Iron Armor', ab:0, db:3, c:60, i:'рЯЫ°пЄП' }, ms:{ n:'Magic Staff', ab:6, db:0, c:150, i:'рЯФЃ' }, sp:{ n:'Steel Plate', ab:0, db:5, c:130, i:'вЪФпЄП' }, lb:{ n:'Legend Blade', ab:12, db:3, c:400, i:'в≠Р' }, sb:{ n:'Swift Boots', ab:2, db:3, c:100, i:'рЯСҐ' }, pr:{ n:'Power Ring', ab:5, db:1, c:200, i:'рЯТН' } };
  const MAX_EQ = 3, CD = 30;
  let mc = null, ae = false, gn = 'FALLEN STAR', lastVisible = Date.now(), isTabVisible = true;

  let S = { g:50, rep:0, gl:1, adv:[], pt:[], lt:Date.now(), lm:[], ac:{}, un:new Set(), dc:{}, aq:{}, qCd:{} };

  function getPartyPower(p) { return p.m.reduce((s,id)=>{const a=S.adv.find(x=>x.id===id);return s+(a?a.atk+a.def:0);},0); }
  function getQuestReq(q) { return q.d * 4; }

  document.addEventListener('visibilitychange', () => { const wh = !isTabVisible; isTabVisible = !document.hidden; if (isTabVisible && wh) { const now = Date.now(); const hd = Math.floor((now - lastVisible) / 1000); if (hd > 2) { const cy = Math.min(Math.floor(hd * 2), 100000); const wa = ae; ae = true; for (let i = 0; i < cy; i++) gloopInternal(); ae = wa; document.getElementById('afkBadge').style.display = 'none'; } lastVisible = Date.now(); } else if (!isTabVisible) { lastVisible = Date.now(); document.getElementById('afkBadge').style.display = 'inline-block'; } });

  function aq() { const now = Date.now(); return QUESTS.filter(q => { if (S.rep < q.rep) return false; if (q.cd > 0 && S.qCd[q.n] && now < S.qCd[q.n]) return false; return true; }); }
  function bq(p) { const pw = getPartyPower(p); const av = aq(); let best = null; for(let q of av) { if(pw >= getQuestReq(q) && (!best || q.d > best.d)) best = q; } return best; }
  function rn() { const av = NAMES.filter(n => !S.un.has(n)); if(!av.length) return NAMES[Math.floor(Math.random()*NAMES.length)] + ' II'; const nm = av[Math.floor(Math.random()*av.length)]; S.un.add(nm); return nm; }
  function al(m) { S.lm.unshift(`рЯХТ ${new Date().toLocaleTimeString().slice(0,5)} ${m}`); if(S.lm.length>10)S.lm.pop(); document.getElementById('logContent').innerHTML = S.lm.join('<br>'); }
  function gcd(id){const c=S.dc[id];return c?Math.max(0,Math.ceil((c-Date.now())/1000)):0;}
  function icd(id){return gcd(id)>0;}
  function scd(id){S.dc[id]=Date.now()+(CD*1000);}
  function fmtTime(sec){if(sec<=0)return'0s';if(sec>=86400)return Math.floor(sec/86400)+'d';const h=Math.floor(sec/3600);const m=Math.floor((sec%3600)/60);const s=sec%60;if(h>0)return`${h}h ${m}m`;if(m>0)return`${m}m ${s}s`;return`${s}s`;}
  function getQcd(qn){if(!S.qCd[qn])return 0;return Math.max(0,Math.ceil((S.qCd[qn]-Date.now())/1000));}

  function sm(t,o,cb){const m=document.getElementById('selectionModal');document.getElementById('modalTitle').textContent=t;const op=document.getElementById('modalOptions');op.innerHTML='';mc=cb;o.forEach(opt=>{const d=document.createElement('div');d.className='modal-option';if(opt.lk)d.classList.add('locked-quest');d.textContent=opt.lb;d.addEventListener('click',function(e){e.stopPropagation();if(!opt.lk){m.classList.remove('active');if(mc){const c=mc;mc=null;c(opt.v);}}});op.appendChild(d);});m.classList.add('active');}
  function fp(id){return S.pt.find(p=>p.m.includes(id))||null;}

  function ic(pid,q){const p=S.pt.find(x=>x.id===pid);if(!p)return;const mb=p.m.map(id=>S.adv.find(a=>a.id===id)).filter(a=>a&&a.hp>0);S.ac[pid]={en:q.e,ehp:q.hp,meh:q.hp,mb:mb.map(m=>({...m,chp:m.hp,bt:0})),ms:[],pw:false,ed:false,td:0,th:0};}
  
  function us(adv,cm){const cd=CL[adv.class];let dmg=0,heal=0,msg='';if(cd.dt==='heal'){heal=Math.floor(adv.atk*1.2*(0.8+Math.random()*0.4));cm.mb.forEach(m=>{m.chp=Math.min(m.maxHp,m.chp+heal);});cm.th+=heal;msg=`вЬЭпЄП ${adv.name} HEALS! +${heal}`;}else{switch(cd.sk){case'cleave':dmg=Math.floor(adv.atk*1.3*(0.7+Math.random()*0.4));msg=`вЪФпЄП ${adv.name} CLEAVES! -${dmg}`;break;case'fireball':dmg=Math.floor(adv.atk*1.1*(0.7+Math.random()*0.4));cm.mb.forEach(m=>{if(m.id===adv.id)m.bt=3;});msg=`рЯФ• ${adv.name} FIREBALL! -${dmg}+BURN`;break;case'backstab':dmg=Math.floor(adv.atk*1.6*(0.8+Math.random()*0.3));msg=`рЯЧ°пЄП ${adv.name} BACKSTAB! -${dmg}`;break;case'lifesteal':dmg=Math.floor(adv.atk*1.2*(0.7+Math.random()*0.4));const sh=Math.floor(dmg*0.4);cm.mb.forEach(m=>{if(m.id===adv.id)m.chp=Math.min(m.maxHp,m.chp+sh);});cm.th+=sh;msg=`рЯТЬ ${adv.name} VAMP! -${dmg}+${sh}HP`;break;default:dmg=Math.floor(adv.atk*0.9*(0.7+Math.random()*0.4));msg=`${cd.e} ${adv.name} attacks! -${dmg}`;}dmg=Math.max(3,dmg);cm.ehp-=dmg;cm.td+=dmg;}return{msg,dmg,heal};}
  
  function tc(pid){const c=S.ac[pid];if(!c||c.pw||c.ed)return;c.ms=[];c.mb.forEach(m=>{if(m.bt>0&&m.chp>0){m.chp-=5;m.bt--;c.ms.push(`рЯФ• ${m.name} -5 burn`);}});c.mb.forEach(m=>{if(m.chp<=0)return;c.ms.push(us(m,c).msg);});if(c.ehp<=0){c.ed=true;c.ms.push(`вЬ® ${c.en} defeated!`);c.mb.forEach(m=>{const a=S.adv.find(x=>x.id===m.id);if(a)a.hp=Math.min(a.maxHp,m.chp+15);});return;}const alv=c.mb.filter(m=>m.chp>0);if(alv.length>0){const t=alv[Math.floor(Math.random()*alv.length)];const q=QUESTS.find(x=>x.e===c.en);const edmg=Math.floor((q?.d||2)*3*(0.7+Math.random()*0.4));t.chp-=edmg;c.ms.push(`рЯСє ${c.en} -${edmg} вЖТ ${t.name}`);if(t.chp<=0){c.ms.push(`рЯТА ${t.name} down!`);t.chp=0;}}if(c.mb.every(m=>m.chp<=0)){c.pw=true;c.ms.push('рЯТА WIPED!');c.mb.forEach(m=>{scd(m.id);const a=S.adv.find(x=>x.id===m.id);if(a)a.hp=0;});}}

  function rc(){const ar=document.getElementById('combatArena');const ac=S.pt.filter(p=>p.q&&S.ac[p.id]);if(!ac.length){ar.className='combat-arena idle';ar.textContent=`вЪФпЄП COMBAT ARENA вЪФпЄП\nNo battles... ${ae?'рЯ§Ц Auto active!':''}`;return;}ar.className='combat-arena';let sc=[];ac.forEach(p=>{const c=S.ac[p.id];if(!c)return;const pct=Math.floor((p.pr/p.td)*100);const rs=Math.ceil((p.td-p.pr)*0.5);const pw=getPartyPower(p);let s=[];if(c.pw)s.push(`рЯТА ${p.n} VS ${c.en} [WIPED]`);else if(c.ed)s.push(`вЪФпЄП ${p.n} VS ${c.en} [DONE!]`);else s.push(`вЪФпЄП ${p.n} VS ${c.en} [${pct}% ¬Ј ${fmtTime(rs)}] вЪ°${pw}`);s.push('вФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБвФБ');if(c.ed||c.pw)s.push(`рЯСє ${c.en}: ${c.ed?'рЯТА DEFEATED':'рЯСС SURVIVED'}`);else{const hp=Math.max(0,c.ehp/c.meh);const br='вЦИ'.repeat(Math.floor(hp*20))+'вЦС'.repeat(20-Math.floor(hp*20));s.push(`рЯСє ${c.en}: [${br}] ${Math.floor(c.ehp)}/${c.meh}`);}s.push(`Dmg:${c.td} Heal:${c.th}`);s.push('');const esp=ES[c.en]||ES['Goblin'];const hsp=c.mb.map(m=>HS[m.class]||HS['warrior']);for(let i=0;i<5;i++){let l='   ';l+=(esp[i]||'     ').padEnd(16);hsp.forEach(sp=>l+=(sp[i]||'     ')+' ');s.push(l);}s.push('');c.mb.forEach(m=>{const hp=Math.max(0,m.chp/m.maxHp);const br='вЦИ'.repeat(Math.floor(hp*10))+'вЦС'.repeat(10-Math.floor(hp*10));s.push(` ${CL[m.class].e} ${m.name}: [${br}] ${m.chp<=0?'рЯТА':'вЭ§пЄП'}${m.bt>0?' рЯФ•':''}`);});if(c.ms.length>0){s.push('');c.ms.slice(-3).forEach(m=>s.push(`  ${m}`));}sc.push(s.join('\n'));});ar.textContent=sc.join('\n\n');}

  function cp(nm){if(S.g<100){al('вЭМ Need 100g!');return;}S.g-=100;const id=Date.now();S.pt.push({id,n:nm||`P${S.pt.length+1}`,m:[],q:null,pr:0,td:0});S.aq[id]=false;al(`рЯОЙ ${nm||'Party'} created!`);ui();}
  function asp(pid,aid){const p=S.pt.find(x=>x.id===pid);const a=S.adv.find(x=>x.id===aid);if(!p||!a)return;if(icd(aid)){al(`вЪ†пЄП ${a.name} recovering`);return;}if(p.m.length>=4){al('вЪ†пЄП Full!');return;}if(a.hp<=0){al('вЪ†пЄП Unconscious!');return;}S.pt.forEach(x=>x.m=x.m.filter(i=>i!==aid));p.m.push(aid);al(`${CL[a.class].e} ${a.name} вЖТ ${p.n}`);ui();}
  function usp(pid,aid){const p=S.pt.find(x=>x.id===pid);if(!p)return;p.m=p.m.filter(i=>i!==aid);const a=S.adv.find(x=>x.id===aid);if(a)al(`рЯФЩ ${a.name} unassigned`);ui();}
  function sq(pid,qi){const p=S.pt.find(x=>x.id===pid);if(!p)return;if(p.q){al('вЪ†пЄП On quest!');return;}if(!p.m.length){al('вЪ†пЄП Empty!');return;}if(p.m.some(i=>icd(i))){al('вЪ†пЄП Recovering');return;}const av=aq();const q=av[qi];if(!q)return;const qcd=getQcd(q.n);if(qcd>0){al(`вЪ†пЄП ${q.n} CD: ${fmtTime(qcd)}`);return;}const pw=getPartyPower(p);const req=getQuestReq(q);if(pw<req){al(`вЪ†пЄП Weak вЪ°${pw}/${req}`);return;}p.q=q;p.pr=0;p.td=q.dur;ic(pid,q);al(`вЪФпЄП ${p.n} вЖТ ${q.i} ${q.n}`);ui();}
  function aaq(p){if(!p||p.q||!p.m.length)return false;if(p.m.some(i=>icd(i)))return false;const b=bq(p);if(!b)return false;const qi=aq().indexOf(b);if(qi>=0){p.q=b;p.pr=0;p.td=b.dur;ic(p.id,b);return true;}return false;}
  function taq(pid){const p=S.pt.find(x=>x.id===pid);if(!p)return;S.aq[pid]=!S.aq[pid];if(S.aq[pid]){al(`рЯ§Ц Auto ON: ${p.n}`);if(!p.q)aaq(p);}else al(`рЯФХ Auto OFF: ${p.n}`);ae=Object.values(S.aq).some(v=>v===true);ui();}
  function taa(){ae=!ae;if(ae){S.pt.forEach(p=>{S.aq[p.id]=true;if(!p.q)aaq(p);});al('рЯ§Ц AUTO ALL ON');}else{S.pt.forEach(p=>S.aq[p.id]=false);al('рЯФХ Auto off');}ui();}
  function be(aid,ek){const a=S.adv.find(x=>x.id===aid);const e=EQ[ek];if(!a||!e)return;if(S.g<e.c){al(`вЭМ ${e.c}g`);return;}if(a.eq.includes(ek)){al('вЪ†пЄП Equipped');return;}if(a.eq.length>=MAX_EQ){al('вЪ†пЄП Full');return;}S.g-=e.c;a.eq.push(ek);a.atk+=e.ab||0;a.def+=e.db||0;al(`рЯЫТ ${a.name}: ${e.i}`);ui();}
  function re(aid,ek){const a=S.adv.find(x=>x.id===aid);const e=EQ[ek];if(!a||!e)return;if(!a.eq.includes(ek)){al('вЪ†пЄП Not equipped');return;}a.eq=a.eq.filter(x=>x!==ek);a.atk-=e.ab||0;a.def-=e.db||0;al(`рЯЧСпЄП ${a.name}: ${e.n}`);ui();}
  function ug(){const c=S.gl*500;if(S.g<c){al(`вЭМ ${c}g`);return;}S.g-=c;S.gl++;S.rep+=50;al(`рЯП∞ Lv${S.gl}!`);ui();}
  function rcl(cn){const cs={warrior:150,mage:180,rogue:160,cleric:130,archer:155,random:100};const c=cs[cn]||100;if(S.g<c){al(`вЭМ ${c}g`);return;}let rc=cn;if(cn==='random'){const ks=Object.keys(CL);rc=ks[Math.floor(Math.random()*ks.length)];}const cd=CL[rc];const nm=rn();S.g-=c;S.adv.push({id:Date.now(),name:nm,class:rc,level:1,exp:0,eq:[],atk:cd.ba,def:cd.bd,hp:100,maxHp:100});al(`рЯІС ${cd.e} ${nm}`);ui();}
  function sae(aid){const a=S.adv.find(x=>x.id===aid);if(!a)return;if(!a.eq.length){al(`вДєпЄП No equipment`);return;}const op=a.eq.map(ek=>{const e=EQ[ek];return{lb:`рЯЧСпЄП Remove ${e.i} ${e.n}`,v:{aid:a.id,ek}};});sm(`${a.name}'s Gear`,op,(d)=>re(d.aid,d.ek));}

  function rq(p){const c=S.ac[p.id];if(!p.q)return;const qn=p.q.n;if(c&&c.pw){al(`рЯТА ${p.n} WIPED!`);p.q=null;p.pr=0;delete S.ac[p.id];return;}if(p.pr>=p.td){if(c&&c.ed){const rw=p.q.r*(1+(S.gl-1)*0.1);S.g+=Math.floor(rw);S.rep+=p.q.d*3;p.m.forEach(id=>{const a=S.adv.find(x=>x.id===id);if(a&&a.hp>0){a.exp+=p.q.d*10;if(a.exp>=a.level*120){a.level++;a.exp=0;a.atk+=3;a.def+=2;a.maxHp+=20;a.hp=a.maxHp;if(!ae)al(`в≠Р ${a.name} вЖТ Lv${a.level}!`);}}});if(!ae)al(`вЬЕ ${p.n}: +${Math.floor(rw)}g`);if(p.q.cd>0){S.qCd[qn]=Date.now()+(p.q.cd*1000);al(`вП≥ ${qn} CD: ${fmtTime(p.q.cd)}`);}}else{al(`вП∞ ${p.n} FAILED!`);}p.q=null;p.pr=0;delete S.ac[p.id];}}

  function gloopInternal(){Object.entries(S.dc).forEach(([id,et])=>{if(Date.now()>=et){const a=S.adv.find(x=>x.id===parseInt(id));if(a&&a.hp<=0){a.hp=a.maxHp;delete S.dc[id];}}});S.pt.forEach(p=>{if(S.aq[p.id]&&!p.q)aaq(p);});S.pt.forEach(p=>{if(!p.q)return;const c=S.ac[p.id];if(c&&c.pw){rq(p);return;}p.pr+=1;if(p.pr%2===0&&c&&!c.ed&&!c.pw){tc(p.id);if(c.pw){rq(p);return;}}if(p.pr>=p.td)rq(p);});}
  function gloop(){gloopInternal();if(isTabVisible)ui();else S.lt=Date.now();}

  function getSortedAdv(){return [...S.adv].sort((a,b)=>a.name.localeCompare(b.name));}
  function getSortedPt(){return [...S.pt].sort((a,b)=>a.n.localeCompare(b.n));}

  function ui(){
    document.getElementById('goldAmount').textContent=Math.floor(S.g);
    document.getElementById('repAmount').textContent=Math.floor(S.rep);
    document.getElementById('guildLevel').textContent=S.gl;
    const ab=document.getElementById('autoAllBtn');
    if(ae){ab.textContent='рЯ§Ц Auto ON';ab.classList.add('active');}else{ab.textContent='рЯ§Ц Auto All';ab.classList.remove('active');}
    if(!isTabVisible)document.getElementById('afkBadge').style.display='inline-block';
    
    let v=['вХФвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХЧ',`вХС рЯП∞ Lv${S.gl} | Rep:${String(S.rep).padStart(4)} | Gold:${String(Math.floor(S.g)).padStart(5)} вХС`,'вХЪвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХЭ','','рЯС• ADVENTURERS:','вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА'];
    getSortedAdv().forEach(a=>{const cd=CL[a.class];const p=fp(a.id);const hp=Math.floor(a.hp/a.maxHp*10);const hb='вЦИ'.repeat(hp)+'вЦС'.repeat(10-hp);const eq=a.eq.map(e=>EQ[e]?.i||'').join(' ')||'(none)';const cd2=gcd(a.id);const gb=a.eq.length>0?' [Gear]':'';v.push(`${cd.e} ${a.name.padEnd(10)} Lv${String(a.level).padStart(2)} [${hb}] вЪ°${a.atk+a.def} ${eq}${cd2>0?' вП≥'+cd2+'s':''}${p?' рЯОТ':''}${gb}`);});
    document.getElementById('guildDisplay').textContent=v.join('\n');
    document.getElementById('guildDisplay').onclick=function(e){const t=this.textContent;const ls=t.split('\n');const lh=18;const r=this.getBoundingClientRect();const ry=e.clientY-r.top+this.scrollTop;const li=Math.floor(ry/lh);if(li>=0&&li<ls.length){const l=ls[li];if(l.includes('[Gear]')){for(const a of S.adv){if(l.includes(a.name)&&a.eq.length>0){sae(a.id);break;}}}}};
    
    const pl=document.getElementById('partyList');
    pl.innerHTML=getSortedPt().map(p=>{const mb=p.m.map(id=>{const a=S.adv.find(x=>x.id===id);return a?`${CL[a.class].e}${a.name}`:'';}).join(',')||'Empty';const c=S.ac[p.id];const fl=c?.pw;const ia=S.aq[p.id];const pct=p.q?Math.min(100,Math.floor((p.pr/p.td)*100)):0;const pw=getPartyPower(p);const req=p.q?getQuestReq(p.q):0;let qs='рЯЫМ';let pfClass='normal';if(p.q){if(c?.pw){qs=`<span style="color:#f44">рЯТА WIPED</span>`;pfClass='failed';}else if(c?.ed){qs=`<span style="color:#4f4">${p.q.i} DONE!</span>`;pfClass='complete';}else{qs=`<span style="color:#fa0">${p.q.i} ${pct}%</span>`;pfClass=ia?'auto':'normal';}}return`<div style="background:#151528;border:1px solid #4a3a20;border-radius:6px;padding:6px;margin:4px 0;"><strong>${p.n}</strong> (${p.m.length}/4) вЪ°${pw}${ia?'<span class="auto-badge">AUTO</span>':''}<br><small>${mb}</small><br>${p.q?`<div class="progress-bar"><div class="progress-fill ${pfClass}" style="width:${pct}%"></div></div>${qs}`:'рЯЫМ Idle'}<br><button class="btn-small" data-a="as" data-p="${p.id}">рЯС§</button><button class="btn-small" data-a="us" data-p="${p.id}">рЯФЩ</button><button class="btn-small" data-a="sq" data-p="${p.id}">рЯУЬ</button><button class="btn-small ${ia?'btn-auto active':'btn-auto'}" data-a="ta" data-p="${p.id}">рЯ§Ц</button></div>`;}).join('');
    
    pl.querySelectorAll('[data-a="as"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const pid=parseInt(this.dataset.p);const tp=S.pt.find(p=>p.id===pid);const av=S.adv.filter(a=>a.hp>0&&!icd(a.id));if(!av.length){al('вЭМ No available');return;}sm(`Assign`,av.map(a=>{const cp=fp(a.id);let lb=`${CL[a.class].e} ${a.name} Lv${a.level} вЪ°${a.atk+a.def}`;let ic=false,io=false;if(cp){if(cp.id===pid){lb+=' вЬЕ';ic=true;}else{lb+=` вЪ†пЄП${cp.n}`;io=true;}}return{lb,v:a.id,inCurrentParty:ic,inOtherParty:io};}),(aid)=>asp(pid,aid));});});
    pl.querySelectorAll('[data-a="us"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const pid=parseInt(this.dataset.p);const p=S.pt.find(x=>x.id===pid);if(!p||!p.m.length){al('вЪ†пЄП Empty');return;}sm(`Unassign`,p.m.map(id=>{const a=S.adv.find(x=>x.id===id);return{lb:`${a?CL[a.class].e+' '+a.name:'?'}`,v:id};}),(aid)=>usp(pid,aid));});});
    pl.querySelectorAll('[data-a="sq"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const pid=parseInt(this.dataset.p);const p=S.pt.find(x=>x.id===pid);if(!p)return;if(p.q){al('вЪ†пЄП On quest');return;}if(!p.m.length){al('вЪ†пЄП Empty');return;}const av=aq();const pw=getPartyPower(p);if(!av.length){al('вЭМ No quests');return;}sm(`Quest вЪ°${pw}`,QUESTS.map((q,i)=>{const qcd=getQcd(q.n);const cdText=qcd>0?` вП≥${fmtTime(qcd)}`:'';const avail=av.some(x=>x.n===q.n);const req=getQuestReq(q);return{lb:`${q.i} ${q.n} D:${q.d} ${q.r}g ${q.dur}s HP:${q.hp} ReqвЪ°${req}${cdText}${!avail&&S.rep>=q.rep?' рЯФТCD':''}${S.rep<q.rep?' рЯФТ'+q.rep:''}`,v:av.indexOf(q),lk:!avail||S.rep<q.rep};}),(qi)=>sq(pid,qi));});});
    pl.querySelectorAll('[data-a="ta"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();taq(parseInt(this.dataset.p));});});
    
    const sl=document.getElementById('shopList');
    sl.innerHTML=Object.entries(EQ).map(([k,e])=>`<div style="display:flex;justify-content:space-between;background:#1a1a2a;padding:5px;margin:2px 0;border-radius:4px;font-size:10px;"><span>${e.i} ${e.n} +${e.ab}A +${e.db}D ${e.c}g</span><button class="btn-small" data-a="by" data-ek="${k}">Buy</button></div>`).join('');
    sl.querySelectorAll('[data-a="by"]').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const ek=this.dataset.ek;const av=S.adv.filter(a=>a.hp>0&&a.eq.length<MAX_EQ);if(!av.length){al('вЭМ No slots');return;}sm(`Buy ${EQ[ek].n}`,av.map(a=>({lb:`${CL[a.class].e} ${a.name}`,v:a.id})),(aid)=>be(aid,ek));});});
    rc();
  }

  function sv(){S.lt=Date.now();const ss={g:S.g,rep:S.rep,gl:S.gl,adv:S.adv,pt:S.pt.map(p=>({...p,q:null,pr:0})),lt:Date.now(),un:Array.from(S.un),dc:S.dc,aq:S.aq,gn:gn,qCd:S.qCd};try{localStorage.setItem('isekaiGV35',btoa(JSON.stringify(ss)));}catch(e){}}
  function ex(){const ss={g:S.g,rep:S.rep,gl:S.gl,adv:S.adv,pt:S.pt.map(p=>({...p,q:null,pr:0})),un:Array.from(S.un),dc:S.dc,aq:S.aq,gn:gn,qCd:S.qCd};const d=btoa(JSON.stringify(ss));const m=document.getElementById('dataModal');document.getElementById('dataTextarea').value=d;document.getElementById('dataActionBtn').style.display='inline-block';document.getElementById('dataImportBtn').style.display='none';m.classList.add('active');document.getElementById('dataActionBtn').onclick=function(){navigator.clipboard?.writeText(document.getElementById('dataTextarea').value);};}
  function im(){const m=document.getElementById('dataModal');document.getElementById('dataTextarea').value='';document.getElementById('dataActionBtn').style.display='none';document.getElementById('dataImportBtn').style.display='inline-block';m.classList.add('active');document.getElementById('dataImportBtn').onclick=function(){try{const dec=JSON.parse(atob(document.getElementById('dataTextarea').value.trim()));S={...S,g:dec.g||50,rep:dec.rep||0,gl:dec.gl||1,adv:dec.adv||[],pt:dec.pt||[],ac:{},un:new Set(dec.un||[]),dc:dec.dc||{},aq:dec.aq||{},lt:Date.now(),lm:S.lm,qCd:dec.qCd||{}};gn=dec.gn||'FALLEN STAR';document.getElementById('guildTitle').textContent=`вЪФпЄП ${gn} вЪФпЄП`;m.classList.remove('active');ui();}catch(e){}};}
  function ld(){const sv=localStorage.getItem('isekaiGV35');if(sv){try{const dec=JSON.parse(atob(sv));S={...S,g:dec.g||50,rep:dec.rep||0,gl:dec.gl||1,adv:dec.adv||[],pt:dec.pt||[],ac:{},un:new Set(dec.un||[]),dc:dec.dc||{},aq:dec.aq||{},lt:dec.lt||Date.now(),lm:S.lm,qCd:dec.qCd||{}};gn=dec.gn||'FALLEN STAR';document.getElementById('guildTitle').textContent=`вЪФпЄП ${gn} вЪФпЄП`;return true;}catch(e){}}return false;}
  function op(){const d=Math.floor((Date.now()-S.lt)/1000);if(d>3){const cy=Math.min(Math.floor(d*2),100000);const wa=ae;ae=true;for(let i=0;i<cy;i++)gloopInternal();ae=wa;}S.lt=Date.now();}

  function sgn(){document.getElementById('guildNameModal').classList.add('active');}
  function cfg(){const n=document.getElementById('guildNameInput').value.trim().toUpperCase()||'FALLEN STAR';gn=n;document.getElementById('guildTitle').textContent=`вЪФпЄП ${gn} вЪФпЄП`;document.getElementById('guildNameModal').classList.remove('active');sv();}

  document.getElementById('confirmGuildName').addEventListener('click',cfg);
  document.getElementById('guildHeader').addEventListener('dblclick',sgn);
  document.getElementById('saveBtn').addEventListener('click',sv);
  document.getElementById('exportBtn').addEventListener('click',ex);
  document.getElementById('importBtn').addEventListener('click',im);
  document.getElementById('upgradeGuildBtn').addEventListener('click',ug);
  document.getElementById('createPartyBtn').addEventListener('click',()=>cp(prompt('Name:')));
  document.getElementById('autoAllBtn').addEventListener('click',taa);
  document.querySelectorAll('[data-recruit]').forEach(b=>{b.addEventListener('click',function(){rcl(this.dataset.recruit);});});
  document.getElementById('closeModalBtn').addEventListener('click',()=>{document.getElementById('selectionModal').classList.remove('active');mc=null;});
  document.getElementById('closeDataBtn').addEventListener('click',()=>document.getElementById('dataModal').classList.remove('active'));
  document.getElementById('selectionModal').addEventListener('click',function(e){if(e.target===this){this.classList.remove('active');mc=null;}});
  document.getElementById('dataModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('active');});

  function init(){
    if(!ld()){S.adv=[{id:1,name:'Aldric',class:'warrior',level:1,exp:0,eq:[],atk:8,def:5,hp:100,maxHp:100}];S.un=new Set(['Aldric']);const pid=Date.now();S.pt=[{id:pid,n:'Starting Party',m:[1],q:null,pr:0,td:0}];S.aq[pid]=false;sgn();}
    document.getElementById('guildTitle').textContent=`вЪФпЄП ${gn} вЪФпЄП`;
    op();ui();setInterval(gloop,500);setInterval(sv,30000);
  }
  window.addEventListener('load',init);
})();
</script>
